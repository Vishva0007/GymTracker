// GIF cache: exerciseName -> {gifUrl, muscles}
const GIF_CACHE = {};

// Fetch GIF from ExerciseDB free API — no key needed
async function fetchGIF(exerciseName){
  if(GIF_CACHE[exerciseName]) return GIF_CACHE[exerciseName];
  const query = GIF_SEARCH[exerciseName] || exerciseName.toLowerCase();
  try{
    const encoded = encodeURIComponent(query);
    const res = await fetch(`https://oss.exercisedb.dev/exercises?name=${encoded}&limit=5`);
    if(!res.ok) throw new Error('API error');
    const data = await res.json();
    // data is array of exercises
    const list = Array.isArray(data) ? data : (data.exercises || data.data || []);
    if(list.length){
      const ex = list[0];
      const gifUrl = ex.gifUrl || ex.imageUrl || ex.image || null;
      const muscles = ex.targetMuscles || ex.target ? [ex.target] : [];
      const result = {gifUrl, muscles};
      GIF_CACHE[exerciseName] = result;
      return result;
    }
  }catch(e){ console.warn('GIF fetch failed for', exerciseName, e); }
  GIF_CACHE[exerciseName] = {gifUrl:null, muscles:[]};
  return GIF_CACHE[exerciseName];
}

// FIREBASE
// ═══════════════════════════════════════
let db=null, syncOn=false, fbLoaded=false;
function getCfg(){ try{ return JSON.parse(localStorage.getItem('gym_fb')||'null'); }catch{return null;} }
function saveCfg(c){ localStorage.setItem('gym_fb',JSON.stringify(c)); }

async function initFB(cfg){
  if(fbLoaded) return;
  try{
    await loadJS('https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js');
    await loadJS('https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js');
    fbLoaded=true;
    if(!firebase.apps.length) firebase.initializeApp(cfg);
    db=firebase.database(); syncOn=true;
    startRTListeners();
    showToast('🔥 Live sync active');
  }catch(e){ syncOn=false; showToast('Firebase failed — local mode','err'); }
}

function loadJS(src){
  return new Promise((res,rej)=>{
    if(document.querySelector(`script[src="${src}"]`)){res();return;}
    const s=document.createElement('script');
    s.src=src; s.onload=res; s.onerror=rej;
    document.head.appendChild(s);
  });
}

function startRTListeners(){
  if(!db) return;
  db.ref('gym/members').on('value',snap=>{const v=snap.val();if(v){STATE.members=v;saveLocal();render();}});
  db.ref('gym/completions').on('value',snap=>{const v=snap.val()||{};STATE.completions=v;saveLocal();render();});
  db.ref('gym/prs').on('value',snap=>{const v=snap.val()||{};STATE.prs=v;saveLocal();render();});
}

async function fbSet(path,data){ if(!db||!syncOn)return; try{await db.ref(path).set(data);}catch(e){showToast('Sync error','err');} }
async function syncAll(){ await Promise.all([fbSet('gym/members',STATE.members),fbSet('gym/completions',STATE.completions),fbSet('gym/prs',STATE.prs)]); }

async function connectFirebase(){
  const key=document.getElementById('fb-key').value.trim();
  const url=document.getElementById('fb-url').value.trim();
  const proj=document.getElementById('fb-proj').value.trim();
  if(!key||!url||!proj){showToast('Fill all 3 fields','err');return;}
  const cfg={apiKey:key,databaseURL:url,projectId:proj,authDomain:`${proj}.firebaseapp.com`,storageBucket:`${proj}.appspot.com`,messagingSenderId:'0',appId:'0'};
  saveCfg(cfg);
  document.getElementById('fb-modal').classList.add('hidden');
  await initFB(cfg); await syncAll();
}
function closeFBModal(){ document.getElementById('fb-modal').classList.add('hidden'); }
function openFBModal(){ document.getElementById('fb-modal').classList.remove('hidden'); }

    {id:'vishva',name:'Vishva',age:22,weight:67,goal:'lean_bulk',gender:'male',level:'intermediate',color:'#2563EB',avatar:'V'},
    {id:'her',name:'Her',age:22,weight:70,goal:'fat_loss',gender:'female',level:'beginner',color:'#DB2777',avatar:'H'},
  ],
  completions:{},prs:{}
};

let V='home',selM=null,selD=null,exOpen={},prMod=null,prDraft={w:'',r:'',n:''};
let addD={name:'',age:'',weight:'',goal:'lean_bulk',gender:'male',level:'beginner',color:'#2563EB'};
let editD=null;
const COLORS=['#2563EB','#DB2777','#16A34A','#EA580C','#9333EA','#0891B2','#DC2626','#7C3AED','#D97706','#0D9488'];

// ═══════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════
function weekNum(){ const n=new Date(),s=new Date(n.getFullYear(),0,1); return Math.ceil(((n-s)/864e5+s.getDay()+1)/7); }
function weekKey(){ return`w${weekNum()}_${new Date().getFullYear()}`; }
function cKey(m,d){ return`${m}_${weekKey()}_d${d}`; }
function isDone(m,d){ return!!STATE.completions[cKey(m,d)]; }
function getPRs(m,n){ return STATE.prs[`${m}__${n}`]||[]; }
function bestPR(m,n){ const p=getPRs(m,n); return p.length?Math.max(...p.map(x=>x.w)):null; }
function wStats(mid){
  const plan=getPlan((STATE.members.find(m=>m.id===mid)||{}).goal||'lean_bulk');
  const t=plan.days.length,d=plan.days.filter((_,i)=>isDone(mid,i)).length;
  return{done:d,total:t,pct:Math.round(d/t*100)};
}
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }

// ═══════════════════════════════════════
// TOAST
// ═══════════════════════════════════════
let _tt=null;
function showToast(msg,type='ok'){
  const el=document.getElementById('toast');
  el.textContent=msg;
  el.style.background=type==='ok'?'#16A34A':type==='err'?'#DC2626':'#2563EB';
  el.style.color='#fff';
  el.classList.remove('hidden');
  if(_tt)clearTimeout(_tt);
  _tt=setTimeout(()=>el.classList.add('hidden'),2800);
}

// ═══════════════════════════════════════
// RENDER
// ═══════════════════════════════════════
function render(){
  const el=document.getElementById('app'); if(!el) return;
  const map={home:homeH,member:memberH,day:dayH,prs:prsH,add:addH,edit:editH};
  el.innerHTML=(map[V]||homeH)();
}

// DAY — with GIF support

    <label class="lbl">Reps completed</label>

    <button class="btnfull" style="background:${day.accent};color:#fff;margin-top:18px" onclick="savePR()">Save PR</button>

  return`${modal}

        <div style="font-size:16px;font-weight:700;margin-top:2px">${day.focus}</div></div>
    </div>
    <div style="display:flex;gap:20px">
      <div style="text-align:center"><div style="font-size:24px;font-weight:800;color:${day.accent}">${day.exercises.length}</div><div style="font-size:10px;color:#444">EXERCISES</div></div>

    </div>
  </div>
  <div style="padding:14px 16px 0">
    ${exCards}

      ${comp?'✕ Unmark Session':'✓ Mark Session Complete'}
    </button>
    <div style="height:20px"></div>
  </div>`;
}

// Build GIF panel HTML
function buildGifPanel(ex, idx, accent, gifData){
  let gifContent='';
  if(!gifData){
    // No cache yet — show spinner, trigger fetch
    gifContent=`<div class="gif-loading"><div class="gif-spinner"></div><div>Loading demo…</div></div>`;
    // Trigger async load and re-render when done
    fetchGIF(ex.name).then(()=>{ if(exOpen[idx]) render(); });
  } else if(gifData.gifUrl){
    gifContent=`<img src="${gifData.gifUrl}" alt="${esc(ex.name)}" loading="lazy" onerror="this.parentElement.innerHTML='<div style=\\'padding:20px;text-align:center;color:#333;font-size:12px\\'>Visual not available</div>'" style="border-radius:0">`;
  } else {
    gifContent=`<div style="padding:24px;text-align:center;color:#333;font-size:12px">Visual not available for this exercise</div>`;
  }

  const muscleHtml=gifData?.muscles?.length
    ? gifData.muscles.map(mu=>`<span class="muscle-tag" style="color:${accent};border-color:${accent}44;background:${accent}11">${mu}</span>`).join('')
    :'';

  return`<div class="gif-panel">
    <div class="gif-wrap">${gifContent}</div>
    <div class="gif-actions">
      <div style="font-size:12px;color:#999;line-height:1.6;flex:1">💡 ${esc(ex.note)}</div>
    </div>
    ${muscleHtml?`<div style="padding:0 14px 12px;display:flex;gap:6px;flex-wrap:wrap">${muscleHtml}</div>`:''}
    <div style="padding:0 14px 14px">
      <button class="btn" style="background:${accent}18;color:${accent};border:1px solid ${accent}33;font-size:12px;padding:8px 14px" onclick="event.stopPropagation();openPR('${esc(ex.name)}')">🏆 Log PR</button>
    </div>
  </div>`;
}

// PRs
function prsH(){
  const m=STATE.members.find(x=>x.id===selM); if(!m) return homeH();
  const plan=getPlan(m.goal);
  const allEx=plan.days.flatMap(d=>d.exercises.map(e=>({...e,lbl:d.label,acc:d.accent})));
  const withPR=allEx.filter(e=>getPRs(m.id,e.name).length>0);
  const content=withPR.length?withPR.map(ex=>{
    const prs=getPRs(m.id,ex.name),best=Math.max(...prs.map(p=>p.w));
    return`<div class="card" style="border-color:${ex.acc}33">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px">
        <div><div style="font-weight:700;font-size:14px">${esc(ex.name)}</div><div style="font-size:11px;color:#555;margin-top:2px">${ex.lbl}</div></div>
        <div style="text-align:right"><div style="font-size:20px;font-weight:800;color:${ex.acc}">${best}kg</div><div style="font-size:10px;color:#444">best</div></div>
      </div>
      ${prs.slice(-3).reverse().map(p=>`<div class="pr-row"><span style="font-size:12px;color:#888">${p.w}kg × ${p.r}${p.n?' · '+p.n:''}</span><span style="font-size:11px;color:#444">${p.d}</span></div>`).join('')}
    </div>`;
  }).join(''):`<div style="text-align:center;padding:70px 0;color:#333"><div style="font-size:44px;margin-bottom:14px">🏆</div><div style="font-size:15px;color:#444">No PRs yet</div><div style="font-size:12px;color:#333;margin-top:6px">Open any session → expand exercise → Log PR</div></div>`;

  return`
  <div style="background:#111;border-bottom:1px solid #1a1a1a;padding:20px 16px">
    <div class="row"><button class="bbtn" onclick="nav('member')">‹</button>
      <div><div style="font-size:10px;color:#444;letter-spacing:.15em;text-transform:uppercase">Personal Records</div><div style="font-size:19px;font-weight:700">${esc(m.name)}'s PRs</div></div>
    </div>
  </div>
  <div style="padding:16px">${content}</div>`;
}

    </select>
    <label class="lbl">Fitness Level</label>
    <select class="sel" onchange="editD.level=this.value">
      <option value="beginner" ${m.level==='beginner'?'selected':''}>Beginner</option>
      <option value="intermediate" ${m.level==='intermediate'?'selected':''}>Intermediate</option>
      <option value="advanced" ${m.level==='advanced'?'selected':''}>Advanced</option>
    </select>
    <label class="lbl">Colour</label>
    <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:8px;margin-bottom:24px">
      ${COLORS.map(c=>`<div class="cdot" style="background:${c};border:3px solid ${m.color===c?'#fff':'transparent'}" onclick="editD.color='${c}';render()"></div>`).join('')}
    </div>
    <button class="btnfull" style="background:${m.color};color:#fff" onclick="doUpdate()">Save Changes</button>
  </div>`;
}

// ═══════════════════════════════════════
// ACTIONS
// ═══════════════════════════════════════
function nav(view,mid,di){
  V=view; exOpen={}; prMod=null;
  if(mid!=null) selM=mid;
  if(di!=null) selD=di;
  if(view==='edit') editD={...STATE.members.find(x=>x.id===selM)};
  render();
  window.scrollTo(0,0);
}

function toggleEx(i){
  exOpen[i]=!exOpen[i];
  // If opening, pre-fetch GIF
  if(exOpen[i]){
    const m=STATE.members.find(x=>x.id===selM);
    const plan=getPlan(m.goal);
    const ex=plan.days[selD].exercises[i];
    if(!GIF_CACHE[ex.name]){
      fetchGIF(ex.name).then(()=>render());
    }
  }
  render();
}

async function toggleSession(){
  const k=cKey(selM,selD);
  if(STATE.completions[k]){delete STATE.completions[k];showToast('Unmarked','info');}
  else{STATE.completions[k]=Date.now();showToast('Session done! 🔥');}
  saveLocal();
  await fbSet('gym/completions',STATE.completions);
  render();
}

function openPR(name){ prMod=name; prDraft={w:'',r:'',n:''}; render(); }
function closePR(){ prMod=null; render(); }

async function savePR(){
  const w=parseFloat(document.getElementById('pr-w')?.value);
  const r=document.getElementById('pr-r')?.value||'';
  const n=document.getElementById('pr-n')?.value||'';
  if(!w||isNaN(w)){showToast('Enter a valid weight','err');return;}
  const k=`${selM}__${prMod}`;
  if(!STATE.prs[k]) STATE.prs[k]=[];
  STATE.prs[k].push({w,r,n,d:new Date().toLocaleDateString('en-IN')});
  prMod=null;
  showToast('PR saved! 💪');
  saveLocal();
  await fbSet('gym/prs',STATE.prs);
  render();
}

async function doAdd(){
  const d=addD;
  if(!d.name.trim()||!d.age||!d.weight){showToast('Name, age & weight required','err');return;}
  const mem={...d,id:'m'+Date.now(),age:parseInt(d.age),weight:parseFloat(d.weight),avatar:d.name.trim()[0].toUpperCase()};
  STATE.members.push(mem);
  addD={name:'',age:'',weight:'',goal:'lean_bulk',gender:'male',level:'beginner',color:'#2563EB'};
  showToast(`${mem.name} added!`);
  saveLocal();
  await fbSet('gym/members',STATE.members);
  nav('home');
}

async function doUpdate(){
  editD.avatar=editD.name.trim()[0].toUpperCase();
  STATE.members=STATE.members.map(m=>m.id===editD.id?{...editD}:m);
  showToast('Saved!');
  saveLocal();
  await fbSet('gym/members',STATE.members);
  nav('member',editD.id);
}

async function doDelete(){
  if(!confirm(`Delete ${editD.name}?`)) return;
  STATE.members=STATE.members.filter(m=>m.id!==editD.id);
  showToast('Deleted','info');
  saveLocal();
  await fbSet('gym/members',STATE.members);
  nav('home');
}

Object.assign(window,{nav,toggleEx,toggleSession,openPR,closePR,savePR,doAdd,doUpdate,doDelete,render,addD,editD,prDraft,STATE,openFBModal,closeFBModal,connectFirebase});

// ═══════════════════════════════════════
// BOOT
// ═══════════════════════════════════════
if('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(()=>{});

async function boot(){
  loadLocal(); render();
  const cfg=getCfg();
  if(cfg) await initFB(cfg);
}
boot();
</script>

<script>
/* ==========================================
   PATCH 1: Fix ExerciseDB GIF API 404 Error
   Intercepts fetch requests to the old broken URL 
   and redirects them to the correct V1 API endpoint.
   ========================================== */
const _originalFetch = window.fetch;
window.fetch = async function(url, options) {
    if (typeof url === 'string' && url.includes('https://oss.exercisedb.dev/exercises')) {
        // Rewrite to the correct API path
        url = url.replace('https://oss.exercisedb.dev/exercises', 'https://oss.exercisedb.dev/api/v1/exercises');
    }
    return _originalFetch(url, options);
};

/* ==========================================
   PATCH 2: Fix Live Sync UI Update
   Wraps the original initFB function to force 
   a UI redraw (render()) immediately after 
   Firebase connects or fails.
   ========================================== */
const _originalInitFB = window.initFB;
if (_originalInitFB) {
    window.initFB = async function(cfg) {
        await _originalInitFB(cfg);
        // Trigger a UI redraw so the "Live Sync" badge appears instantly
        if (typeof render === 'function') render();
    };
}
</script>
